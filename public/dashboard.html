<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Budgie Lingo</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="assets/budgie.svg" alt="Budgie">
    Budgie Lingo
  </div>
  <div class="user-controls">
    <span id="userName"></span>
    <button class="btn small secondary" id="logoutBtn">Log out</button>
    <button class="btn small danger" id="deleteBtn">Delete account</button>
  </div>
</div>

<main class="container">
  <h2 class="section-title" style="margin-top:0">My languages</h2>
  <div id="myLanguages" class="my-languages"></div>
  <p class="empty-state" id="noLangsMsg" style="display:none">
    <img src="assets/budgie.svg" class="mascot" alt="Budgie">
    You're not learning any language yet — pick one below to start!
  </p>

  <h2 class="section-title">All languages</h2>
  <div id="langGrid" class="lang-grid"></div>
</main>

<script src="js/dashboard.js"></script>
</body>
</html>
