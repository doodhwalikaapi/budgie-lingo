<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson — Budgie Lingo</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="assets/budgie.svg" alt="Budgie">
    <span id="courseTitle">Budgie Lingo</span>
  </div>
  <div class="user-controls">
    <a href="dashboard.html" class="btn small secondary">← Dashboard</a>
  </div>
</div>

<main class="container">
  <!-- Lesson list view -->
  <div id="lessonListView">
    <h2 class="section-title" style="margin-top:0">Lessons</h2>
    <div id="lessonList" class="lesson-list"></div>
  </div>

  <!-- Lesson play view -->
  <div id="lessonPlayView" class="lesson-play" style="display:none">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="question-card" id="questionCard"></div>
  </div>

  <!-- Lesson complete view -->
  <div id="lessonCompleteView" class="lesson-complete" style="display:none">
    <img src="assets/budgie.svg" alt="Budgie celebrating" class="mascot">
    <h2>Lesson complete! 🎉</h2>
    <p id="completeMsg"></p>
    <button class="btn" id="backToLessonsBtn" style="max-width:260px; margin:1rem auto 0">Back to lessons</button>
  </div>
</main>

<script src="js/lesson.js"></script>
</body>
</html>
