<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — Budgie Lingo</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-center">
  <div class="card">
    <img src="assets/budgie.svg" alt="Budgie mascot" class="mascot">
    <h1>Budgie Lingo</h1>
    <p class="tagline">Create your account and start learning</p>

    <p class="error-msg" id="errorMsg"></p>

    <form id="signupForm">
      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" required placeholder="e.g. Priya">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="At least 6 characters" minlength="6">
      </div>
      <button type="submit" class="btn" id="submitBtn">Create account</button>
    </form>

    <p class="switch-line">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>

<script>
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Signup failed');
      window.location.href = 'dashboard.html';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  });
</script>
</body>
</html>
