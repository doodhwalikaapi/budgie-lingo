<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Budgie Lingo</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-center">
  <div class="card">
    <img src="assets/budgie.svg" alt="Budgie mascot" class="mascot">
    <h1>Welcome back</h1>
    <p class="tagline">Log in to keep learning</p>

    <p class="error-msg" id="errorMsg"></p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Your password">
      </div>
      <button type="submit" class="btn" id="submitBtn">Log in</button>
    </form>

    <p class="switch-line">New here? <a href="signup.html">Create an account</a></p>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      window.location.href = 'dashboard.html';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  });
</script>
</body>
</html>
